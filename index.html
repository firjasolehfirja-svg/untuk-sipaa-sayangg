<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="bg-hearts"></div>

<audio id="music" autoplay loop>
    <source src="assets/music.mp3" type="audio/mp3">
</audio>

<div class="container">

<h1 class="title">
Happy Birthday ❤️
</h1>

<p class="subtitle">
Swipe the knife to cut the cake 🎂
</p>

<div class="cake-area">

<img
src="assets/cake.png"
class="cake"
id="cake">

<img
src="assets/knife.png"
id="knife"
class="knife">

</div>

<div id="confetti"></div>

</div>

<div id="nextPage">

<h2>
I Have Something For You 💖
</h2>

<div class="gallery">

<img src="assets/photos/1.jpg">
<img src="assets/photos/2.jpg">
<img src="assets/photos/3.jpg">
<img src="assets/photos/4.jpg">

</div>

<p class="message">

Happy Birthday Sayang ❤️

Semoga semua impianmu tercapai,
selalu sehat,
selalu bahagia,
dan semoga kita bisa terus bersama selamanya.

I Love You 🤍

</p>

</div>

<script src="script.js"></script>

</body>
</html>
